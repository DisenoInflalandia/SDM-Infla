<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tickets de Diseño</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  body{ font-family:'Inter',system-ui,sans-serif; }
  ::selection{ background:#fed303; }
  .print-only{ display:none; }
  @media print {
    .no-print{ display:none !important; }
    .print-only{ display:block !important; }
  }
  #toast-container{ position:fixed; bottom:2rem; right:2rem; z-index:9999; display:flex; flex-direction:column; gap:.5rem; max-width:320px; }
  .toast-item{ padding:1rem 1.25rem; border-radius:1rem; box-shadow:0 10px 30px rgba(0,0,0,.15); border:1px solid; animation:slideIn .25s ease-out; }
  @keyframes slideIn{ from{ transform:translateX(30px); opacity:0; } to{ transform:translateX(0); opacity:1; } }
  ::-webkit-scrollbar{ width:6px; height:6px; }
  ::-webkit-scrollbar-thumb{ background:#e2e8f0; border-radius:10px; }
</style>
</head>
<body class="bg-[#fafafa] text-slate-900">
  <div id="toast-container"></div>
  <div id="app"></div>

<script>
/* =========================================================
   CONFIGURACIÓN — edita estos valores antes de publicar
   ========================================================= */
const CONFIG = {
  GAS_URL: 'https://script.google.com/macros/s/AKfycbyk6s3AB2YCcymuInD_wrjJD9J9yw_OgONeaMMbdSHMLRUKo9MYyEDRq4Q83hHBkxLfrA/exec',
  PASSWORD_PANEL: 'diseno2024',
  HORA_CORTE: '14:30',                 // hora de corte para ajustes/urgencias del mismo día
  LIMITE_TICKETS_DISENADOR: 5,         // tickets activos antes de avisar sobrecarga
  POLL_MS: 25000                       // cada cuánto se refresca automáticamente
};

const MARCAS = ['Fábrica de Inflables', 'Zona Play', 'Inflalandia', 'Oink'];
const SUCURSALES = ['Pachuca', 'Oceanía', 'Coapa', 'Metepec', 'Monterrey', 'Puebla', 'Sentura', 'Guadalajara', 'Cancún', 'Corporativo'];
const DISENADORES = ['Angie', 'Josué', 'Alexis'];

const NIVELES = [
  { id:'Sencillo', label:'Sencillo', dias:1, color:'bg-emerald-50 text-emerald-700 border-emerald-200', ejemplos:'Cambio de texto, precio o fecha en un diseño ya existente' },
  { id:'Estandar', label:'Estándar', dias:3, color:'bg-blue-50 text-blue-700 border-blue-200', ejemplos:'Flyer o post nuevo, adaptación de una plantilla existente' },
  { id:'Complejo', label:'Complejo', dias:5, color:'bg-indigo-50 text-indigo-700 border-indigo-200', ejemplos:'Lona/gran formato, ilustración desde cero, varias piezas' },
  { id:'Campana', label:'Campaña', dias:10, color:'bg-purple-50 text-purple-700 border-purple-200', ejemplos:'Campaña integral con varias piezas coordinadas' }
];

const ESTADOS = [
  { id:'En Fila de Espera', label:'En Fila', color:'bg-slate-100 text-slate-500 border-slate-200' },
  { id:'Asignado', label:'Asignado', color:'bg-blue-50 text-blue-600 border-blue-100' },
  { id:'En Proceso', label:'Procesando', color:'bg-amber-50 text-amber-600 border-amber-100' },
  { id:'En Revisión', label:'Revisar', color:'bg-purple-50 text-purple-600 border-purple-100' },
  { id:'Entregado', label:'Listo', color:'bg-emerald-50 text-emerald-600 border-emerald-100' }
];

const CLS_INPUT = "w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-bold outline-none focus:border-black";

/* =========================================================
   ESTADO
   ========================================================= */
let state = {
  vista: 'solicitante',
  tickets: [],
  cargando: true,
  ultimaActualizacion: null,
  panelAuth: sessionStorage.getItem('panelAuth') === '1',
  ticketSel: null,
  busqueda: '',
  filtroMarca: 'Todas',
  filtroDisenador: 'Todos',
  orden: 'urgencia',
  form: { marca:'', sucursal:'', solicitante:'', telefono:'', esAjuste:false, ticketPrevio:'', nivel:'Estandar', urgente:false, descripcion:'', referencia:'' },
  advertenciaUrgencia: false,
  advertenciaCarga: null,
  subiendoCaptura: false,
  mostrarComentario: null,
  comentarioModal: ''
};

/* =========================================================
   UTILADES DE FECHA / SLA
   ========================================================= */
function sumarDiasHabiles(fecha, dias){
  let d = new Date(fecha);
  let c = 0;
  while(c < dias){
    d.setDate(d.getDate() + 1);
    if(d.getDay() !== 0 && d.getDay() !== 6) c++;
  }
  return d;
}
function formatoFecha(d){ return new Date(d).toISOString().split('T')[0]; }
function minutosDeHoraTexto(txt){ const [h,m] = txt.split(':').map(Number); return h*60+m; }
function minutosAhora(){ const n = new Date(); return n.getHours()*60 + n.getMinutes(); }
function antesDeCorte(){ return minutosAhora() <= minutosDeHoraTexto(CONFIG.HORA_CORTE); }

function calcularFechaSLA({ esAjuste, urgente, nivelId }){
  const hoy = new Date();
  if(esAjuste || urgente){
    return formatoFecha(antesDeCorte() ? hoy : sumarDiasHabiles(hoy, 1));
  }
  const nivel = NIVELES.find(n => n.id === nivelId) || NIVELES[1];
  return formatoFecha(sumarDiasHabiles(hoy, nivel.dias));
}

function contarActivosDisenador(nombre){
  return state.tickets.filter(t => t.disenador === nombre && (t.estado === 'Asignado' || t.estado === 'En Proceso')).length;
}
function contarUrgentesEnFila(){
  return state.tickets.filter(t => t.urgente === 'SI' && t.estado !== 'Entregado').length;
}

/* =========================================================
   ALMACENAMIENTO LOCAL (entidad del dispositivo)
   ========================================================= */
function getDeviceId(){
  let id = localStorage.getItem('deviceId');
  if(!id){ id = 'dev-' + Math.random().toString(36).slice(2) + Date.now(); localStorage.setItem('deviceId', id); }
  return id;
}
function getMisFolios(){
  try{ return JSON.parse(localStorage.getItem('misFolios') || '[]'); } catch(e){ return []; }
}
function agregarMiFolio(folio){
  const arr = getMisFolios();
  arr.unshift(folio);
  localStorage.setItem('misFolios', JSON.stringify(arr.slice(0, 80)));
}

/* =========================================================
   API (Google Apps Script)
   ========================================================= */
async function apiGet(){
  const res = await fetch(CONFIG.GAS_URL, { method:'GET' });
  return res.json();
}
async function apiPost(payload){
  const res = await fetch(CONFIG.GAS_URL, {
    method:'POST',
    headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // evita preflight CORS con Apps Script
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function refrescar(silencioso){
  if(!silencioso){ state.cargando = true; render(); }
  try{
    const data = await apiGet();
    if(data.ok){
      state.tickets = data.tickets;
      state.ultimaActualizacion = new Date();
    } else {
      mostrarToast('Error al cargar datos: ' + data.error, 'error');
    }
  } catch(e){
    mostrarToast('No se pudo conectar con el servidor.', 'error');
  }
  state.cargando = false;
  render();
}

/* =========================================================
   ACCIONES: SOLICITUD
   ========================================================= */
async function enviarSolicitud(confirmadoUrgente){
  const f = state.form;
  if(!f.marca || !f.sucursal || !f.solicitante || !f.telefono || !f.descripcion){
    mostrarToast('Completa todos los campos obligatorios (*).', 'error'); return;
  }
  if(f.urgente && !confirmadoUrgente){ state.advertenciaUrgencia = true; render(); return; }

  const fechaEntregaEstimada = calcularFechaSLA({ esAjuste:f.esAjuste, urgente:f.urgente, nivelId:f.nivel });
  const payload = {
    accion:'guardar',
    marca:f.marca, sucursal:f.sucursal, solicitante:f.solicitante, telefono:f.telefono.replace(/\D/g,''),
    esAjuste:f.esAjuste, ticketPrevio:f.ticketPrevio, ronda:f.esAjuste?1:0,
    complejidad: f.esAjuste ? 'Sencillo' : f.nivel,
    descripcion:f.descripcion, referencia:f.referencia, urgente:f.urgente,
    fechaEntregaEstimada, creadorId:getDeviceId()
  };
  try{
    const res = await apiPost(payload);
    if(res.ok){
      agregarMiFolio(res.ticket.folio);
      mostrarToast('¡Solicitud enviada! Folio ' + res.ticket.folio);
      state.form = { marca:'', sucursal:'', solicitante:f.solicitante, telefono:f.telefono, esAjuste:false, ticketPrevio:'', nivel:'Estandar', urgente:false, descripcion:'', referencia:'' };
      state.advertenciaUrgencia = false;
      await refrescar(true);
      state.ticketSel = res.ticket;
    } else {
      mostrarToast('Error: ' + res.error, 'error');
    }
  } catch(e){
    mostrarToast('No se pudo enviar. Revisa tu conexión.', 'error');
  }
  render();
}

async function actualizarCampos(folio, campos){
  try{
    const res = await apiPost({ accion:'actualizar', folio, campos });
    if(res.ok){
      const t = state.tickets.find(x => x.folio === folio);
      if(t) Object.assign(t, campos);
      if(state.ticketSel && state.ticketSel.folio === folio) Object.assign(state.ticketSel, campos);
      render();
    } else {
      mostrarToast('Error al actualizar: ' + res.error, 'error');
    }
  } catch(e){
    mostrarToast('No se pudo actualizar. Revisa tu conexión.', 'error');
  }
}

/* =========================================================
   ACCIONES: PRODUCCIÓN
   ========================================================= */
function asignarDisenador(folio, disenador){
  if(disenador === 'Sin Asignar'){ actualizarCampos(folio, { disenador }); return; }
  const activos = contarActivosDisenador(disenador);
  if(activos >= CONFIG.LIMITE_TICKETS_DISENADOR){
    state.advertenciaCarga = { folio, disenador, activos };
    render();
    return;
  }
  const t = state.tickets.find(x => x.folio === folio);
  const nuevoEstado = t && t.estado === 'En Fila de Espera' ? 'Asignado' : (t ? t.estado : 'Asignado');
  actualizarCampos(folio, { disenador, estado: nuevoEstado });
}

function confirmarAsignacionConCarga(retrasar){
  const { folio, disenador } = state.advertenciaCarga;
  const t = state.tickets.find(x => x.folio === folio);
  const campos = { disenador, estado: t && t.estado === 'En Fila de Espera' ? 'Asignado' : (t ? t.estado : 'Asignado') };
  if(retrasar){
    const nueva = sumarDiasHabiles(new Date(), 2);
    campos.fechaEntregaEstimada = formatoFecha(nueva);
    campos.motivoAjusteFecha = 'Alta carga de trabajo del diseñador';
  }
  actualizarCampos(folio, campos);
  state.advertenciaCarga = null;
  render();
}

function avanzarEstado(folio){
  const t = state.tickets.find(x => x.folio === folio);
  if(!t) return;
  const idx = ESTADOS.findIndex(e => e.id === t.estado);
  if(idx < ESTADOS.length - 1) actualizarCampos(folio, { estado: ESTADOS[idx+1].id });
}

function comprimirImagen(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 1100;
        const escala = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * escala;
        canvas.height = img.height * escala;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
        resolve({ base64: dataUrl.split(',')[1], mimeType:'image/jpeg' });
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function manejarCaptura(folio, file){
  if(!file) return;
  state.subiendoCaptura = true; render();
  try{
    const { base64, mimeType } = await comprimirImagen(file);
    const res = await apiPost({ accion:'subirCaptura', folio, imagenBase64:base64, mimeType });
    if(res.ok){
      const campos = { capturaURL: res.url, fechaCaptura: new Date().toISOString(), estado:'En Revisión' };
      const t = state.tickets.find(x => x.folio === folio);
      if(t) Object.assign(t, campos);
      if(state.ticketSel && state.ticketSel.folio === folio) Object.assign(state.ticketSel, campos);
      mostrarToast('Captura subida. El solicitante ya puede revisarla.');
    } else {
      mostrarToast('Error al subir captura: ' + res.error, 'error');
    }
  } catch(e){
    mostrarToast('No se pudo subir la captura.', 'error');
  }
  state.subiendoCaptura = false;
  render();
}

/* =========================================================
   ACCIONES: APROBACIÓN DEL SOLICITANTE
   ========================================================= */
function aprobarDiseno(folio){
  actualizarCampos(folio, { estado:'Entregado', fechaAprobacion: new Date().toISOString() });
  mostrarToast('¡Diseño aprobado!');
}

async function pedirCambios(folio, comentario){
  if(!comentario || !comentario.trim()){ mostrarToast('Escribe qué cambios necesitas.', 'error'); return; }
  const original = state.tickets.find(x => x.folio === folio);
  if(!original) return;
  actualizarCampos(folio, { comentarioSolicitante: comentario, estado:'En Proceso' });
  const fechaEntregaEstimada = calcularFechaSLA({ esAjuste:true, urgente:false, nivelId:'Sencillo' });
  try{
    const res = await apiPost({
      accion:'guardar',
      marca: original.marca, sucursal: original.sucursal, solicitante: original.solicitante, telefono: original.telefono,
      esAjuste:true, ticketPrevio: folio, ronda: (Number(original.ronda) || 0) + 1, complejidad:'Sencillo',
      descripcion: 'Ajuste solicitado sobre ' + folio + ': ' + comentario, referencia:'', urgente:false,
      fechaEntregaEstimada, creadorId:getDeviceId()
    });
    if(res.ok){
      agregarMiFolio(res.ticket.folio);
      mostrarToast('Se registró tu solicitud de cambios (' + res.ticket.folio + ').');
      refrescar(true);
    }
  } catch(e){ mostrarToast('No se pudo registrar el ajuste.', 'error'); }
}

/* =========================================================
   PANEL DE PRODUCCIÓN — ACCESO
   ========================================================= */
function intentarEntrarPanel(){
  const input = document.getElementById('input-password-panel');
  if(input && input.value === CONFIG.PASSWORD_PANEL){
    state.panelAuth = true;
    sessionStorage.setItem('panelAuth', '1');
    mostrarToast('Bienvenida al panel de producción.');
  } else {
    mostrarToast('Contraseña incorrecta.', 'error');
  }
  render();
}

/* =========================================================
   AYUDAS DE UI
   ========================================================= */
function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function mostrarToast(texto, tipo){
  const cont = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast-item ' + (tipo === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-slate-950 border-slate-800 text-white');
  el.innerHTML = '<span class="font-bold text-xs">' + escapeHtml(texto) + '</span>';
  cont.appendChild(el);
  setTimeout(() => el.remove(), 4500);
}
function setDeep(path, value){
  const parts = path.split('.');
  let obj = state;
  for(let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  obj[parts[parts.length - 1]] = value;
}
function getDeep(path){
  const parts = path.split('.');
  let obj = state;
  for(const p of parts) obj = obj ? obj[p] : undefined;
  return obj;
}
function generarRecibo(t){
  return `========================================
* SISTEMA DE DISEÑO - TICKETS *
========================================
FOLIO:         ${escapeHtml(t.folio)}
REGISTRO:      ${escapeHtml(String(t.fechaHora).slice(0,16).replace('T',' '))}
MARCA:         ${escapeHtml((t.marca||'').toUpperCase())}
SUCURSAL:      ${escapeHtml((t.sucursal||'').toUpperCase())}
SOLICITANTE:   ${escapeHtml((t.solicitante||'').toUpperCase())}
----------------------------------------
COMPLEJIDAD:   ${escapeHtml((t.complejidad||'').toUpperCase())}
URGENTE:       ${t.urgente === 'SI' ? 'SI' : 'NO'}
ENTREGA EST:   ${escapeHtml(t.fechaEntregaEstimada)}
ESTATUS:       ${escapeHtml((t.estado||'').toUpperCase())}
----------------------------------------
COMPROBANTE OFICIAL DE RECEPCIÓN.
========================================`;
}

/* =========================================================
   RENDER
   ========================================================= */
function render(){
  const activo = document.activeElement;
  const focoId = activo && activo.id ? activo.id : null;
  const selStart = activo && 'selectionStart' in activo ? activo.selectionStart : null;
  const selEnd = activo && 'selectionEnd' in activo ? activo.selectionEnd : null;

  const app = document.getElementById('app');
  app.innerHTML = renderAvisoConfig() + renderHeader() +
    (state.vista === 'solicitante' ? renderVistaSolicitante() : renderVistaProduccion()) +
    renderModales() +
    (state.ticketSel ? renderPrintOnly(state.ticketSel) : '');

  if(focoId){
    const el = document.getElementById(focoId);
    if(el){
      el.focus();
      if(selStart != null && 'setSelectionRange' in el){ try{ el.setSelectionRange(selStart, selEnd); } catch(e){} }
    }
  }
}

function renderAvisoConfig(){
  if(!CONFIG.GAS_URL.includes('PON_AQUI')) return '';
  return `<div class="no-print bg-red-600 text-white text-center text-[11px] font-black py-2 px-4">⚠ Falta configurar CONFIG.GAS_URL en el código con la URL de tu Apps Script.</div>`;
}

function renderHeader(){
  return `
  <header class="no-print bg-white border-b border-slate-200/60 sticky top-0 z-40 px-4 md:px-6 py-3 shadow-sm">
    <div class="max-w-[1600px] mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
      <div class="flex items-center gap-3">
        <div class="bg-[#fed303] p-2 rounded-xl text-lg">🎨</div>
        <div>
          <h1 class="text-sm font-black uppercase tracking-tight">Tickets de Diseño</h1>
          <p class="text-[9px] text-slate-400 font-bold">${state.ultimaActualizacion ? 'Actualizado: ' + state.ultimaActualizacion.toLocaleTimeString() : 'Cargando...'}</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
          <button data-action="cambiar-vista" data-vista="solicitante" class="px-4 py-2 rounded-lg text-[11px] font-black uppercase transition-all ${state.vista==='solicitante'?'bg-white shadow-sm text-black':'text-slate-500'}">Solicitar</button>
          <button data-action="cambiar-vista" data-vista="produccion" class="px-4 py-2 rounded-lg text-[11px] font-black uppercase transition-all ${state.vista==='produccion'?'bg-white shadow-sm text-black':'text-slate-500'}">Producción</button>
        </div>
        <button data-action="refrescar" class="p-2.5 bg-slate-100 rounded-xl text-xs" title="Refrescar">🔄</button>
      </div>
    </div>
  </header>`;
}

function renderVistaSolicitante(){
  const f = state.form;
  const sla = calcularFechaSLA({ esAjuste:f.esAjuste, urgente:f.urgente, nivelId:f.nivel });
  const misFolios = getMisFolios();
  const misTickets = state.tickets
    .filter(t => misFolios.includes(t.folio))
    .filter(t => !state.busqueda || JSON.stringify(t).toLowerCase().includes(state.busqueda.toLowerCase()));

  return `
  <main class="no-print max-w-7xl mx-auto p-4 md:p-6">
   <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
     <div class="lg:col-span-5 space-y-5">
       <div class="bg-white border border-slate-200 rounded-[28px] p-6 shadow-sm">
         <h2 class="text-xs font-black uppercase tracking-widest mb-5 flex items-center gap-2 border-b pb-4 border-slate-50">
           <span class="w-1.5 h-4 bg-[#fed303] rounded-full inline-block"></span> Nueva solicitud

         <div class="space-y-4">

               ${SUCURSALES.map(s => `<option value="${s}" ${f.sucursal===s?'selected':''}>${s}</option>`).join('')}
             </select>
           </div>

           <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
             <input id="input-solicitante" data-field="form.solicitante" value="${escapeHtml(f.solicitante)}" placeholder="Nombre del solicitante *" class="${CLS_INPUT}" />
             <input id="input-telefono" data-field="form.telefono" value="${escapeHtml(f.telefono)}" placeholder="WhatsApp *" class="${CLS_INPUT}" />
           </div>

           <div class="p-4 bg-slate-50 rounded-2xl border border-slate-200/60 space-y-2">
             <label class="flex items-center gap-2 text-[10px] font-black cursor-pointer">
               <input type="checkbox" data-field="form.esAjuste" ${f.esAjuste?'checked':''} class="rounded accent-black" />
               <span>🔄 ES UN AJUSTE A UN DISEÑO PREVIO</span>
             </label>
             ${f.esAjuste ? `
               <select data-field="form.ticketPrevio" class="${CLS_INPUT}">
                 <option value="">-- Selecciona el folio previo --</option>
                 ${state.tickets.filter(t => t.sucursal === f.sucursal).map(t => `<option value="${t.folio}" ${f.ticketPrevio===t.folio?'selected':''}>${t.folio} — ${escapeHtml(String(t.descripcion||'').slice(0,30))}</option>`).join('')}
               </select>
               <p class="text-[9px] text-slate-400 font-bold leading-relaxed">Los ajustes respetan nuestra hora de corte (${CONFIG.HORA_CORTE}): antes de esa hora buscamos resolverlo el mismo día; después, pasa al siguiente día hábil. Aunque el cambio sea sencillo, guardar y exportar toma tiempo — mantente pendiente para aprobar en cuanto te avisemos.</p>
             ` : ''}
           </div>

           ${!f.esAjuste ? `
           <div>
             <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block">Nivel de complejidad *</label>

function renderVistaProduccion(){

  let lista = state.tickets.filter(t => {
    const m = state.filtroMarca === 'Todas' || t.marca === state.filtroMarca;

    const b = !state.busqueda || JSON.stringify(t).toLowerCase().includes(state.busqueda.toLowerCase());
    return m && d && b;
  });

  const rango = { Sencillo:0, Estandar:1, Complejo:2, Campana:3 };
  lista.sort((a, b) => {
    if(state.orden === 'urgencia'){
      if((a.urgente === 'SI') !== (b.urgente === 'SI')) return a.urgente === 'SI' ? -1 : 1;
      return new Date(a.fechaHora) - new Date(b.fechaHora);

    if(state.orden === 'complejidad_alta') return (rango[b.complejidad]||0) - (rango[a.complejidad]||0);
    if(state.orden === 'complejidad_baja') return (rango[a.complejidad]||0) - (rango[b.complejidad]||0);
    return new Date(a.fechaHora) - new Date(b.fechaHora);
  });

  const urgentesActivos = lista.filter(t => t.urgente === 'SI' && t.estado !== 'Entregado').length;

/* =========================================================
   EVENTOS (delegados — evita el bug de onclick antes de cargar JS)
   ========================================================= */
document.addEventListener('input', e => {
  const field = e.target.dataset.field;
  const esTexto = e.target.tagName === 'TEXTAREA' || (e.target.tagName === 'INPUT' && e.target.type !== 'checkbox' && e.target.type !== 'file');
  if(field && esTexto){ setDeep(field, e.target.value); render(); }
});

document.addEventListener('change', e => {
  const field = e.target.dataset.field;
  if(field){
    const val = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
    setDeep(field, val);
    render();
  }
  const action = e.target.dataset.action;
  if(action === 'captura-file') manejarCaptura(e.target.dataset.folio, e.target.files[0]);
  if(action === 'asignar-disenador') asignarDisenador(e.target.dataset.folio, e.target.value);
  if(action === 'cambiar-estado-manual') actualizarCampos(e.target.dataset.folio, { estado: e.target.value });
});

document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const a = btn.dataset.action;
  const folio = btn.dataset.folio;

  if(a === 'cambiar-vista'){ state.vista = btn.dataset.vista; state.ticketSel = null; render(); }
  else if(a === 'set-nivel'){ state.form.nivel = btn.dataset.nivel; render(); }
  else if(a === 'toggle-urgente'){ state.form.urgente = btn.dataset.valor === 'si'; render(); }
  else if(a === 'enviar-solicitud'){ enviarSolicitud(false); }
  else if(a === 'confirmar-urgente'){ enviarSolicitud(true); }
  else if(a === 'cancelar-urgente'){ state.advertenciaUrgencia = false; render(); }
  else if(a === 'abrir-ticket'){ state.ticketSel = state.tickets.find(t => t.folio === folio); state.mostrarComentario = null; state.comentarioModal = ''; render(); }
  else if(a === 'cerrar-modal'){ state.ticketSel = null; state.mostrarComentario = null; state.comentarioModal = ''; render(); }
  else if(a === 'refrescar'){ refrescar(false); }
  else if(a === 'avanzar-estado'){ avanzarEstado(folio); }
  else if(a === 'aprobar'){ aprobarDiseno(folio); state.ticketSel = null; render(); }
  else if(a === 'abrir-pedir-cambios'){ state.mostrarComentario = folio; render(); }
  else if(a === 'enviar-cambios'){ pedirCambios(folio, state.comentarioModal || ''); state.mostrarComentario = null; state.comentarioModal = ''; state.ticketSel = null; render(); }
  else if(a === 'imprimir'){ window.print(); }
  else if(a === 'whatsapp'){
    const t = state.tickets.find(x => x.folio === folio);
    if(t){
      const txt = encodeURIComponent('Hola ' + t.solicitante + ', tu ticket ' + t.folio + ' está en estatus: ' + t.estado + '. Fecha estimada: ' + t.fechaEntregaEstimada + '.');
      window.open('https://api.whatsapp.com/send?phone=52' + t.telefono + '&text=' + txt);
    }
  }
  else if(a === 'entrar-panel'){ intentarEntrarPanel(); }
  else if(a === 'salir-panel'){ state.panelAuth = false; sessionStorage.removeItem('panelAuth'); render(); }
  else if(a === 'confirmar-carga-mantener'){ confirmarAsignacionConCarga(false); }
  else if(a === 'confirmar-carga-retrasar'){ confirmarAsignacionConCarga(true); }
  else if(a === 'cancelar-carga'){ state.advertenciaCarga = null; render(); }
});

/* =========================================================
   INICIO
   ========================================================= */
document.addEventListener('DOMContentLoaded', () => {
  render();
  refrescar(false);
  setInterval(() => refrescar(true), CONFIG.POLL_MS);
});
</script>
</body>
</html>
